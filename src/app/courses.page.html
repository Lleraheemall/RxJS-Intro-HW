<div class="courses-container">
  <div class="search-section">
    <h1>Курси</h1>
    <div class="search-box">
      <input
        type="text"
        [formControl]="searchControl"
        placeholder="Пошук курсів за назвою..."
        class="search-input"
      />
      <span class="search-icon">🔍</span>
    </div>
  </div>

  <div class="courses-list" *ngIf="courses$ | async as courses">
    <div *ngIf="courses.length === 0" class="no-results">
      <p>Курсів не знайдено</p>
    </div>

    <div *ngIf="courses.length > 0" class="course-grid">
      <div *ngFor="let course of courses" class="course-card">
        <div class="course-header">
          <h3>{{ course.title }}</h3>
          <span class="course-id">#{{ course.id }}</span>
        </div>

        <div class="course-body">
          <p class="course-category"><strong>Категорія:</strong> {{ course.category }}</p>
          <p class="course-duration"><strong>Тривалість:</strong> {{ course.duration }} годин</p>
        </div>

        <div class="course-footer">
          <button class="btn-details">Детальніше</button>
        </div>
      </div>
    </div>

    <div class="results-info">
      <p>Знайдено {{ courses.length }} курс(ів)</p>
    </div>
  </div>
</div>
